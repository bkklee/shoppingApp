name: Submit to TestFlight (iOS)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build-and-submit:
    name: Build & Submit iOS App locally
    runs-on: macos-latest
    steps:
      - name: 🏗 Setup repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🛠 Build Production IPA (Local)
        run: npx eas build --platform ios --profile production --local --non-interactive --output=./pricebite-hk.ipa

      - name: 📤 Submit to App Store Connect
        run: npx eas submit --platform ios --profile production --path ./pricebite-hk.ipa --non-interactive
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
